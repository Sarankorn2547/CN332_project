<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Food Locker System{% endblock %}</title>
    
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fff9e6',
                            100: '#fff3cd',
                            200: '#ffe6a0',
                            300: '#ffd93d',
                            400: '#ffed4e',
                            500: '#ffc107',
                            600: '#ff9800',
                            700: '#ff8e53',
                            800: '#ff6b6b',
                            900: '#e74c3c',
                        },
                        success: {
                            50: '#d4edda',
                            100: '#c3e6cb',
                            500: '#4caf50',
                            600: '#43a047',
                            700: '#2e7d32',
                        },
                        danger: {
                            50: '#ffe6e6',
                            100: '#ffcccc',
                            500: '#ff5252',
                            600: '#e53935',
                            700: '#c62828',
                        },
                    },
                    fontFamily: {
                        'thai': ['Sarabun', 'Noto Sans Thai', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Google Fonts for Thai -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
        }
        
        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
        
        /* Touch-friendly buttons */
        .btn-touch {
            min-height: 50px;
            min-width: 50px;
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255, 217, 61, 0.3);
            border-top: 3px solid #ffd93d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Smooth transitions */
        * {
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 antialiased">
    {% block content %}{% endblock %}
    
    <!-- Global HTMX configuration -->
    <script>
        // HTMX global error handler
        document.body.addEventListener('htmx:responseError', function(event) {
            console.error('HTMX Error:', event.detail);
            
            // Handle 401 Unauthorized - redirect to login
            if (event.detail.xhr.status === 401) {
                alert('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
                window.location.href = '/login/';
            }
            
            // Handle network errors
            if (event.detail.xhr.status === 0) {
                alert('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
            }
        });
        
        // HTMX loading indicator
        document.body.addEventListener('htmx:beforeRequest', function(event) {
            console.log('HTMX Request:', event.detail.path);
        });
        
        document.body.addEventListener('htmx:afterRequest', function(event) {
            console.log('HTMX Response:', event.detail.xhr.status);
        });
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>

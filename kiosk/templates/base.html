{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Food Locker System{% endblock %}</title>
    
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Custom Alpine.js utilities (MUST load before Alpine.js CDN) -->
    <script defer src="{% static 'js/alpine-utils.js' %}"></script>

    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.11/dist/cdn.min.js"></script>
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#fff9e6',
                            100: '#fff3cd',
                            200: '#ffe6a0',
                            300: '#ffd93d',
                            400: '#ffed4e',
                            500: '#ffc107',
                            600: '#ff9800',
                            700: '#ff8e53',
                            800: '#ff6b6b',
                            900: '#e74c3c',
                        },
                        success: {
                            50: '#d4edda',
                            100: '#c3e6cb',
                            500: '#4caf50',
                            600: '#43a047',
                            700: '#2e7d32',
                        },
                        danger: {
                            50: '#ffe6e6',
                            100: '#ffcccc',
                            500: '#ff5252',
                            600: '#e53935',
                            700: '#c62828',
                        },
                    },
                    fontFamily: {
                        'thai': ['Sarabun', 'Noto Sans Thai', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Google Fonts for Thai -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
        }
        
        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-request.htmx-indicator {
            display: inline-block;
        }
        
        /* Touch-friendly buttons */
        .btn-touch {
            min-height: 50px;
            min-width: 50px;
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(255, 217, 61, 0.3);
            border-top: 3px solid #ffd93d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Smooth transitions */
        * {
            transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 antialiased">
    {% block content %}{% endblock %}
    <!-- Global toast notification (controlled by Alpine.store('toast')) -->
    <div x-data
         x-show="$store.toast.visible"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed top-4 right-4 z-50 px-6 py-4 rounded-lg shadow-xl max-w-md"
         :class="{
           'bg-success-600 text-white':  $store.toast.type === 'success',
           'bg-danger-600 text-white':   $store.toast.type === 'error',
           'bg-primary-500 text-white':  $store.toast.type === 'warning',
           'bg-blue-600 text-white':     $store.toast.type === 'info'
         }"
         style="display: none;">
      <div class="flex items-center gap-3">
        <span x-text="$store.toast.message" class="text-lg font-medium"></span>
      </div>
    </div>

    <!-- Global loading overlay (controlled by Alpine.store('loading')) -->
    <div x-data
         x-show="$store.loading.active"
         x-transition.opacity
         class="fixed inset-0 z-40 bg-black/50 flex items-center justify-center"
         style="display: none;">
      <div class="bg-white rounded-2xl p-8 flex flex-col items-center gap-4 shadow-2xl">
        <div class="spinner"></div>
        <span class="text-gray-700 text-lg">กำลังโหลด...</span>
      </div>
    </div>

    <!-- Global HTMX configuration -->
    <script>
        // HTMX global error handler
        document.body.addEventListener('htmx:responseError', function(event) {
            console.error('HTMX Error:', event.detail);
            const status = event.detail.xhr.status;

            // 401 Unauthorized → redirect to login
            if (status === 401) {
                sessionStorage.removeItem('jwt');
                if (window.Alpine && Alpine.store('toast')) {
                    Alpine.store('toast').error('เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่');
                }
                setTimeout(() => { window.location.href = '/login/'; }, 1500);
                return;
            }

            // 0 = network error
            if (status === 0) {
                if (window.Alpine && Alpine.store('toast')) {
                    Alpine.store('toast').error('ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต');
                }
                return;
            }

            // 5xx server error
            if (status >= 500) {
                if (window.Alpine && Alpine.store('toast')) {
                    Alpine.store('toast').error('เกิดข้อผิดพลาดที่เซิร์ฟเวอร์ กรุณาลองใหม่');
                }
                return;
            }
        });

        // HTMX global loading state — ผูกกับ Alpine store
        document.body.addEventListener('htmx:beforeRequest', function(event) {
            console.log('HTMX Request:', event.detail.path);
            if (window.Alpine && Alpine.store('loading')) {
                Alpine.store('loading').start();
            }
        });

        document.body.addEventListener('htmx:afterRequest', function(event) {
            console.log('HTMX Response:', event.detail.xhr.status);
            if (window.Alpine && Alpine.store('loading')) {
                Alpine.store('loading').stop();
            }
        });
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>

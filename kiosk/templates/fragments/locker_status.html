<!-- HTMX Fragment: Locker status indicator -->
{% if locker %}
<div class="inline-flex items-center space-x-2">
    <span class="w-3 h-3 rounded-full {% if locker.status == 'AVAILABLE' %}bg-green-500{% elif locker.status == 'BOOKED' %}bg-yellow-500{% else %}bg-red-500{% endif %}"></span>
    <span class="text-sm">
        {% if locker.status == 'AVAILABLE' %}ว่าง
        {% elif locker.status == 'BOOKED' %}จองแล้ว
        {% else %}ใช้งาน
        {% endif %}
    </span>
</div>
{% endif %}

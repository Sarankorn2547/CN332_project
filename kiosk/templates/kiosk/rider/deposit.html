{% extends "base.html" %}

{% block title %}ฝากอาหาร - Rider{% endblock %}

{% block content %}
<div class="container mx-auto p-4 font-thai"
     x-data="depositCapture()"
     x-init="startCamera()"
     @beforeunload.window="cleanup()">
    <div class="text-center text-gray-600 mb-2">Step 4 of 4</div>
    <h1 class="text-2xl font-bold mb-2 text-center">ไรเดอร์ - ฝากอาหารและถ่ายรูป</h1>
    <p class="text-center text-success-600 mb-6 font-medium">✅ ตู้เปิดเรียบร้อยแล้ว</p>

    <div class="max-w-xl mx-auto">
        <!-- Instructions -->
        <ol class="bg-primary-50 border-l-4 border-primary-500 p-4 rounded mb-6 list-decimal ml-6 text-sm">
            <li>วางอาหารในตู้</li>
            <li>ปิดประตูตู้</li>
            <li>ถ่ายรูปยืนยันการฝาก</li>
            <li>กดปุ่ม "เสร็จสิ้น"</li>
        </ol>

        <!-- Camera / Photo preview -->
        <div class="bg-black rounded-lg overflow-hidden aspect-video shadow-lg">
            <video x-ref="video" x-show="!photoTaken"
                   autoplay playsinline class="w-full h-full object-cover"></video>
            <img x-show="photoTaken" :src="photoData"
                 class="w-full h-full object-cover" alt="ภาพที่ถ่าย">
        </div>
        <canvas x-ref="canvas" class="hidden"></canvas>

        <!-- Camera permission error -->
        <div x-show="cameraError"
             class="mt-4 p-3 bg-danger-50 border-l-4 border-danger-500 text-sm rounded">
            <p class="font-bold text-danger-700">ไม่สามารถเปิดกล้องได้</p>
            <p x-text="cameraError"></p>
        </div>

        <!-- Action buttons -->
        <div class="mt-4">
            <template x-if="!photoTaken && !cameraError">
                <button @click="takePhoto()"
                        class="btn-touch w-full bg-primary-600 hover:bg-primary-700 text-white px-4 py-3 rounded font-bold">
                    📷 ถ่ายรูปยืนยัน
                </button>
            </template>

            <template x-if="photoTaken">
                <div class="flex gap-3">
                    <button @click="retake()"
                            class="btn-touch flex-1 bg-gray-500 hover:bg-gray-600 text-white px-4 py-3 rounded">
                        ถ่ายใหม่
                    </button>
                    <button @click="submit()"
                            :disabled="submitting"
                            class="btn-touch flex-1 bg-success-600 hover:bg-success-700 text-white px-4 py-3 rounded font-bold disabled:bg-gray-400">
                        <span x-show="!submitting">เสร็จสิ้น ✓</span>
                        <span x-show="submitting">กำลังบันทึก...</span>
                    </button>
                </div>
            </template>
        </div>

        <div class="mt-6">
            <a href="{% url 'kiosk:rider_confirm' %}"
               class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded text-sm inline-block">← กลับ</a>
        </div>
    </div>
</div>

<script>
function depositCapture() {
    return {
        stream: null,
        photoTaken: false,
        photoData: '',
        submitting: false,
        cameraError: '',

        async startCamera() {
            try {
                this.stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                this.$refs.video.srcObject = this.stream;
            } catch (e) {
                this.cameraError = e.message || 'กรุณาอนุญาตให้ใช้กล้อง';
            }
        },

        takePhoto() {
            const video = this.$refs.video;
            const canvas = this.$refs.canvas;
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            this.photoData = canvas.toDataURL('image/jpeg', 0.7);
            this.photoTaken = true;
        },

        retake() {
            this.photoTaken = false;
            this.photoData = '';
        },

        async submit() {
            this.submitting = true;
            const booking = JSON.parse(sessionStorage.getItem('booking') || '{}');
            try {
                const url = `/kiosk/api/lockers/${booking.locker_id}/deposit/`;
                await this.$api.post(url, { photo: this.photoData });
                this.cleanup();
                sessionStorage.setItem('deposit_time', new Date().toISOString());
                window.location.href = '{% url "kiosk:rider_success" %}';
            } catch (e) {
                Alpine.store('toast').error('บันทึกไม่สำเร็จ: ' + e.message);
                this.submitting = false;
            }
        },

        cleanup() {
            if (this.stream) {
                this.stream.getTracks().forEach(t => t.stop());
                this.stream = null;
            }
        }
    };
}
</script>
{% endblock %}

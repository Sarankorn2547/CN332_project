{% extends "base.html" %}
{% load static %}
{% block title %}เลือกขนาดตู้ - Rider{% endblock %}

{% block content %}
<div class="container mx-auto p-4 font-thai" x-data="riderSizeSelect()" x-init="loadSizes()">
    <div class="text-center text-gray-600 mb-2">Step 1 of 4</div>
    <h1 class="text-2xl font-bold mb-4">ไรเดอร์ - เลือกขนาดตู้</h1>

    <!-- Loading state -->
    <div x-show="loading" class="text-center text-gray-500 py-8">
        กำลังโหลด...
    </div>

    <!-- Empty state -->
    <div x-show="!loading && sizes.length === 0" class="text-center text-gray-500 py-8">
        ไม่พบขนาดตู้ที่ใช้งานได้
    </div>

    <!-- Size grid -->
    <div x-show="!loading && sizes.length > 0"
         class="grid grid-cols-2 gap-4 mt-4 max-w-2xl mx-auto">
        <template x-for="size in sizes" :key="size.code">
            <button
                @click="selectSize(size)"
                :disabled="size.available === 0"
                :class="size.available > 0
                        ? 'bg-success-500 hover:bg-success-600 text-white'
                        : 'bg-gray-300 text-gray-500 cursor-not-allowed'"
                class="btn-touch p-6 rounded-lg min-h-[120px] shadow">
                <div class="text-4xl font-bold" x-text="size.code"></div>
                <div class="mt-2 text-sm" x-text="size.dimensions"></div>
                <div class="mt-2">
                    ว่าง: <span class="font-bold" x-text="size.available"></span>
                </div>
            </button>
        </template>
    </div>

    <div class="mt-6">
        <a href="{% url 'kiosk:home' %}"
           class="btn-touch bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded inline-block">
            ← กลับหน้าหลัก
        </a>
    </div>
</div>

<script>
function riderSizeSelect() {
    return {
        sizes: [],
        loading: false,
        // TODO: building_id ควรมาจาก context หรือ session
        buildingId: '{{ building_id|default:"1" }}',

        async loadSizes() {
            this.loading = true;
            try {
                const url = `{% url 'kiosk:htmx_locker_sizes' %}?building_id=${this.buildingId}`;
                const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
                const data = await res.json();
                this.sizes = data.sizes || [];
            } catch (e) {
                Alpine.store('toast').error('โหลดข้อมูลขนาดตู้ไม่สำเร็จ');
            } finally {
                this.loading = false;
            }
        },

        async selectSize(size) {
            if (size.available === 0) return;
            try {
                const booking = await this.$api.post(
                    '{% url "kiosk:api_book_locker" %}',
                    { size: size.code, type: 'rider', building_id: this.buildingId }
                );
                sessionStorage.setItem('booking', JSON.stringify(booking));
                window.location.href = '{% url "kiosk:rider_qr_display" %}';
            } catch (e) {
                Alpine.store('toast').error('จองตู้ไม่สำเร็จ: ' + e.message);
            }
        }
    };
}
</script>
{% endblock %}

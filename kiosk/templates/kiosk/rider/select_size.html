{% extends "base.html" %}
{% load static %}
{% block title %}เลือกขนาดตู้ - ไรเดอร์{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-orange-50 to-yellow-50 flex items-center justify-center p-4"
     x-data="riderSizeSelect()"
     x-init="loadSizes()">

  <div class="w-full max-w-lg">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="text-sm text-gray-500 mb-1">Step 1 of 4</div>
      <div class="text-4xl mb-2">🛵</div>
      <h1 class="text-3xl font-bold text-gray-800">เลือกขนาดตู้</h1>
      <p class="text-gray-500 mt-1">เลือกขนาดที่เหมาะกับอาหารที่ฝาก</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg border-2 border-primary-100 p-6 mb-4">

      <!-- Loading -->
      <div x-show="loading" class="flex items-center justify-center py-10 gap-3 text-gray-400">
        <svg class="animate-spin h-6 w-6" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
        </svg>
        กำลังโหลด...
      </div>

      <!-- Empty -->
      <div x-show="!loading && sizes.length === 0"
           class="text-center py-10 text-gray-400">
        <div class="text-4xl mb-2">📭</div>
        <p>ไม่พบขนาดตู้ที่ว่าง</p>
      </div>

      <!-- Size grid -->
      <div x-show="!loading && sizes.length > 0"
           class="grid grid-cols-2 gap-3">
        <template x-for="size in sizes" :key="size.code">
          <button @click="selectSize(size)"
                  :disabled="size.available === 0"
                  class="btn-touch p-5 rounded-xl border-2 min-h-[110px] shadow-sm transition-all active:scale-95"
                  :class="size.available > 0
                    ? 'bg-success-50 border-success-400 text-success-800 hover:bg-success-100'
                    : 'bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed'">
            <div class="text-3xl font-bold" x-text="size.code"></div>
            <div class="text-xs mt-1 opacity-70" x-text="size.dimensions"></div>
            <div class="mt-2 text-sm">
              ว่าง: <span class="font-bold" x-text="size.available"></span>
            </div>
          </button>
        </template>
      </div>
    </div>

    <!-- Back -->
    <div class="text-center">
      <a href="{% url 'kiosk:home' %}"
         class="text-gray-500 hover:text-gray-700 text-sm underline underline-offset-2">
        ← กลับหน้าหลัก
      </a>
    </div>

  </div>
</div>

<script>
function riderSizeSelect() {
  return {
    sizes: [],
    loading: false,
    buildingId: '{{ building_id|default:"1" }}',

    async loadSizes() {
      this.loading = true;
      try {
        const url = `{% url 'kiosk:htmx_locker_sizes' %}?building_id=${this.buildingId}`;
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        const data = await res.json();
        this.sizes = data.sizes || [];
      } catch (e) {
        Alpine.store('toast').error('โหลดข้อมูลขนาดตู้ไม่สำเร็จ');
      } finally {
        this.loading = false;
      }
    },

    async selectSize(size) {
      if (size.available === 0) return;
      try {
        const booking = await this.$api.post(
          '{% url "kiosk:api_book_locker" %}',
          { size: size.code, type: 'rider', building_id: this.buildingId }
        );
        sessionStorage.setItem('booking', JSON.stringify(booking));
        window.location.href = '{% url "kiosk:rider_qr_display" %}';
      } catch (e) {
        Alpine.store('toast').error('จองตู้ไม่สำเร็จ: ' + e.message);
      }
    }
  };
}
</script>
{% endblock %}

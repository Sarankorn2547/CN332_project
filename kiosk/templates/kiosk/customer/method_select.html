{% extends "base.html" %}

{% block title %}เลือกวิธียืนยันตัวตน - ลูกบ้าน{% endblock %}

{% block content %}
<div class="min-h-screen bg-gradient-to-br from-orange-50 to-yellow-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🏠</div>
      <h1 class="text-3xl font-bold text-gray-800">รับอาหาร</h1>
      <p class="text-gray-500 mt-1">เลือกวิธียืนยันตัวตน</p>
    </div>

    <!-- Method buttons -->
    <div class="space-y-4">

      <a href="{% url 'kiosk:customer_qr_scan' %}"
         class="block w-full bg-white border-4 border-primary-300 text-gray-800 rounded-2xl shadow-xl
                hover:shadow-2xl hover:-translate-y-1 active:scale-95 transition-all duration-200 p-7 btn-touch">
        <div class="flex items-center gap-5">
          <span class="text-5xl">📷</span>
          <div class="text-left">
            <div class="text-2xl font-bold">สแกน QR Code</div>
            <div class="text-gray-500 text-sm mt-0.5">ใช้กล้องสแกน QR ที่ได้รับ</div>
          </div>
        </div>
      </a>

      <a href="{% url 'kiosk:customer_pin_entry' %}"
         class="block w-full bg-gradient-to-br from-primary-600 to-primary-500 text-white rounded-2xl shadow-xl
                hover:shadow-2xl hover:-translate-y-1 active:scale-95 transition-all duration-200 p-7 btn-touch">
        <div class="flex items-center gap-5">
          <span class="text-5xl">🔢</span>
          <div class="text-left">
            <div class="text-2xl font-bold">กรอกรหัส PIN</div>
            <div class="text-primary-100 text-sm mt-0.5">ใช้รหัส 4 หลักที่ได้รับ</div>
          </div>
        </div>
      </a>

    </div>

    <!-- Back -->
    <div class="mt-8 text-center">
      <a href="{% url 'kiosk:home' %}"
         class="text-gray-500 hover:text-gray-700 text-sm underline underline-offset-2">
        ← กลับหน้าหลัก
      </a>
    </div>

  </div>
</div>
{% endblock %}

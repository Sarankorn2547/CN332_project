{% extends "base.html" %}

{% block title %}ลงทะเบียน - Registration{% endblock %}

{% block extra_head %}
<!-- LINE LIFF SDK -->
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
{% endblock %}

{% block content %}
<div class="container mx-auto p-4 max-w-md">
    <h1 class="text-2xl font-bold mb-4">ลงทะเบียนผู้ใช้งาน</h1>
    
    <!-- TODO: Implement LINE LIFF integration and cascade selection -->
    <form class="space-y-4">
        <div>
            <label class="block text-gray-700 mb-2">โครงการ</label>
            <select class="w-full border border-gray-300 rounded px-3 py-2">
                <option value="">เลือกโครงการ</option>
            </select>
        </div>
        
        <div>
            <label class="block text-gray-700 mb-2">อาคาร</label>
            <select class="w-full border border-gray-300 rounded px-3 py-2" disabled>
                <option value="">เลือกอาคาร</option>
            </select>
        </div>
        
        <div>
            <label class="block text-gray-700 mb-2">ห้อง</label>
            <select class="w-full border border-gray-300 rounded px-3 py-2" disabled>
                <option value="">เลือกห้อง</option>
            </select>
        </div>
        
        <button type="submit" class="w-full bg-blue-500 text-white px-4 py-3 rounded font-bold" disabled>
            ลงทะเบียน
        </button>
    </form>
</div>
{% endblock %}
